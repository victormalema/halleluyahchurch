<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleluyah Church International — Preparing Your Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES — Color Palette
        ============================================ */
        :root {
            --burgundy: #4A0E24;
            --burgundy-2: #3A0B1C;
            --burgundy-3: #5E1530;
            --burgundy-4: #7A1D3E;
            --burgundy-deep: #1A040D;
            --gold: #C49A3C;
            --gold-light: #DDBA5C;
            --gold-pale: #F0E6C8;
            --gold-dark: #9A7A2E;
            --gold-warm: #D4A850;
            --parchment: #FAF7F0;
            --parchment-2: #F2EBDA;
            --parchment-3: #E2D6C2;
            --warm-white: #FEFCF8;
            --charcoal: #1A1410;
            --warm-grey: #6B5B4E;
            --mid-grey: #9A8B7A;
            --light-grey: #C8BDA8;
            --white: #FFFFFF;
            --ruby: #8B1A38;
            --velvet: #3D0D20;
        }

        /* ============================================
           RESET & BASE STYLES
        ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--burgundy-deep);
            font-family: 'Cormorant Garamond', Georgia, serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           PRELOADER OVERLAY
        ============================================ */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, var(--burgundy-2) 0%, var(--burgundy-deep) 60%, #0D0207 100%);
            opacity: 1;
            animation: preloaderExit 1.5s cubic-bezier(0.4, 0, 0.2, 1) 7.5s forwards;
            will-change: opacity, transform;
        }

        @keyframes preloaderExit {
            0% { opacity: 1; transform: translateY(0); }
            60% { opacity: 0.3; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); pointer-events: none; }
        }

        /* ============================================
           BACKGROUND LIGHT RAYS
        ============================================ */
        .light-rays {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vmax;
            height: 100vmax;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            animation: raysAppear 2s ease-out 3s forwards;
        }

        @keyframes raysAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .light-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 50%;
            transform-origin: top center;
            background: linear-gradient(to bottom, rgba(196, 154, 60, 0.15), transparent);
            border-radius: 1px;
        }

        .light-ray:nth-child(1) { transform: rotate(0deg) translateY(10%); animation: rayExpand 2s ease-out 3s forwards; }
        .light-ray:nth-child(2) { transform: rotate(22.5deg) translateY(10%); animation: rayExpand 2s ease-out 3.1s forwards; }
        .light-ray:nth-child(3) { transform: rotate(45deg) translateY(10%); animation: rayExpand 2s ease-out 3.2s forwards; }
        .light-ray:nth-child(4) { transform: rotate(67.5deg) translateY(10%); animation: rayExpand 2s ease-out 3.3s forwards; }
        .light-ray:nth-child(5) { transform: rotate(90deg) translateY(10%); animation: rayExpand 2s ease-out 3.4s forwards; }
        .light-ray:nth-child(6) { transform: rotate(112.5deg) translateY(10%); animation: rayExpand 2s ease-out 3.5s forwards; }
        .light-ray:nth-child(7) { transform: rotate(135deg) translateY(10%); animation: rayExpand 2s ease-out 3.6s forwards; }
        .light-ray:nth-child(8) { transform: rotate(157.5deg) translateY(10%); animation: rayExpand 2s ease-out 3.7s forwards; }
        .light-ray:nth-child(9) { transform: rotate(180deg) translateY(10%); animation: rayExpand 2s ease-out 3.8s forwards; }
        .light-ray:nth-child(10) { transform: rotate(202.5deg) translateY(10%); animation: rayExpand 2s ease-out 3.9s forwards; }
        .light-ray:nth-child(11) { transform: rotate(225deg) translateY(10%); animation: rayExpand 2s ease-out 4s forwards; }
        .light-ray:nth-child(12) { transform: rotate(247.5deg) translateY(10%); animation: rayExpand 2s ease-out 4.1s forwards; }
        .light-ray:nth-child(13) { transform: rotate(270deg) translateY(10%); animation: rayExpand 2s ease-out 4.2s forwards; }
        .light-ray:nth-child(14) { transform: rotate(292.5deg) translateY(10%); animation: rayExpand 2s ease-out 4.3s forwards; }
        .light-ray:nth-child(15) { transform: rotate(315deg) translateY(10%); animation: rayExpand 2s ease-out 4.4s forwards; }
        .light-ray:nth-child(16) { transform: rotate(337.5deg) translateY(10%); animation: rayExpand 2s ease-out 4.5s forwards; }

        @keyframes rayExpand {
            from { height: 0; opacity: 0; }
            to { height: 50%; opacity: 1; }
        }

        /* ============================================
           VIGNETTE OVERLAY
        ============================================ */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 25%, var(--burgundy-deep) 85%);
            animation: vignetteLighten 2s ease-out 3s forwards;
        }

        @keyframes vignetteLighten {
            from { background: radial-gradient(ellipse at center, transparent 25%, var(--burgundy-deep) 85%); }
            to { background: radial-gradient(ellipse at center, transparent 35%, var(--burgundy-deep) 95%); }
        }

        /* ============================================
           CENTER GLOW (behind cross)
        ============================================ */
        .center-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 154, 60, 0.2) 0%, rgba(196, 154, 60, 0.05) 40%, transparent 70%);
            opacity: 0;
            animation: glowAppear 3s ease-out 1.5s forwards, glowPulse 4s ease-in-out 4.5s infinite;
            pointer-events: none;
        }

        @keyframes glowAppear {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
        }

        /* ============================================
           CROSS CONTAINER
        ============================================ */
        .cross-container {
            position: relative;
            width: 200px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: crossScaleUp 1.5s cubic-bezier(0.4, 0, 0.2, 1) 3s forwards;
            will-change: transform;
        }

        @keyframes crossScaleUp {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* ============================================
           CROSS STROKES — Vertical & Horizontal
        ============================================ */
        .cross-stroke {
            position: absolute;
            background: var(--gold);
            border-radius: 2px;
            will-change: transform, opacity;
        }

        /* Vertical stroke */
        .cross-vertical {
            width: 4px;
            height: 100%;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: top center;
            animation: drawVertical 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
            box-shadow:
                0 0 12px 4px rgba(221, 186, 92, 0.5),
                0 0 32px 12px rgba(240, 230, 200, 0.2),
                0 0 64px 24px rgba(196, 154, 60, 0.1);
        }

        @keyframes drawVertical {
            from { transform: translateX(-50%) scaleY(0); }
            to { transform: translateX(-50%) scaleY(1); }
        }

        /* Horizontal stroke */
        .cross-horizontal {
            width: 55%;
            height: 4px;
            top: 32%;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            transform-origin: center;
            animation: drawHorizontal 0.8s cubic-bezier(0.4, 0, 0.2, 1) 2.2s forwards;
            box-shadow:
                0 0 12px 4px rgba(221, 186, 92, 0.5),
                0 0 32px 12px rgba(240, 230, 200, 0.2),
                0 0 64px 24px rgba(196, 154, 60, 0.1);
        }

        @keyframes drawHorizontal {
            from { transform: translateX(-50%) scaleX(0); }
            to { transform: translateX(-50%) scaleX(1); }
        }

        /* ============================================
           CROSS GLOW LAYERS
        ============================================ */
        .cross-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 154, 60, 0.15) 0%, rgba(196, 154, 60, 0.05) 30%, transparent 60%);
            opacity: 0;
            animation: glowLayerAppear 2s ease-out 2.5s forwards;
            pointer-events: none;
        }

        @keyframes glowLayerAppear {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }



        /* ============================================
           PARTICLE SYSTEM
        ============================================ */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* ============================================
           TYPOGRAPHY
        ============================================ */
        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 48px;
            opacity: 0;
            animation: textFadeIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) 4.5s forwards;
        }

        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .church-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 48px;
            letter-spacing: 0.35em;
            color: var(--gold);
            text-transform: uppercase;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(196, 154, 60, 0.3), 0 2px 8px rgba(0,0,0,0.5);
        }

        .church-name .line-1,
        .church-name .line-2 {
            display: block;
            opacity: 0;
            animation: wordReveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .church-name .line-1 {
            animation-delay: 4.6s;
        }

        .church-name .line-2 {
            animation-delay: 4.8s;
            margin-top: 4px;
        }

        @keyframes wordReveal {
            from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 0.2em;
            color: var(--parchment);
            margin-top: 20px;
            opacity: 0;
            animation: subtitleReveal 1s ease-out 5.2s forwards;
        }

        @keyframes subtitleReveal {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           PROGRESS BAR
        ============================================ */
        .progress-container {
            position: relative;
            z-index: 10;
            margin-top: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0;
            animation: progressAppear 0.8s ease-out 4.8s forwards;
        }

        @keyframes progressAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .progress-track {
            width: 280px;
            height: 2px;
            background: var(--charcoal);
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
            border-radius: 1px;
            animation: progressFill 1.8s cubic-bezier(0.4, 0, 0.2, 1) 5s forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes progressFill {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* Shimmer on progress bar */
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShimmer 1.5s ease-in-out 5.2s infinite;
        }

        @keyframes progressShimmer {
            0% { left: -60%; }
            100% { left: 160%; }
        }

        .progress-text {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
            font-size: 14px;
            letter-spacing: 0.15em;
            color: var(--gold-pale);
        }

        /* ============================================
           FINAL GLOW BURST (exit)
        ============================================ */
        .exit-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 154, 60, 0.8) 0%, rgba(221, 186, 92, 0.3) 30%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            animation: exitGlowBurst 1.5s ease-out 6.5s forwards;
        }

        @keyframes exitGlowBurst {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(8); }
        }

        /* ============================================
           MAIN CONTENT (revealed after preloader)
        ============================================ */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--warm-white);
            opacity: 0;
            animation: contentReveal 1.5s cubic-bezier(0.4, 0, 0.2, 1) 7.8s forwards;
            z-index: 1;
            padding: 40px;
            text-align: center;
        }

        @keyframes contentReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-content h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 56px;
            letter-spacing: 0.25em;
            color: var(--burgundy);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .main-content p {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 0.15em;
            color: var(--warm-grey);
        }

        /* ============================================
           RESPONSIVE DESIGN
        ============================================ */
        @media (max-width: 768px) {
            .cross-container {
                width: 140px;
                height: 168px;
            }

            .church-name {
                font-size: 32px;
                letter-spacing: 0.25em;
            }

            .subtitle {
                font-size: 14px;
                letter-spacing: 0.15em;
            }

            .progress-track {
                width: 220px;
            }

            .center-glow {
                width: 200px;
                height: 200px;
            }

            .main-content h1 {
                font-size: 36px;
                letter-spacing: 0.15em;
            }

            .main-content p {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .cross-container {
                width: 120px;
                height: 144px;
            }

            .church-name {
                font-size: 24px;
                letter-spacing: 0.2em;
            }

            .subtitle {
                font-size: 12px;
                letter-spacing: 0.12em;
            }

            .progress-track {
                width: 180px;
            }

            .text-container {
                margin-top: 36px;
            }

            .progress-container {
                margin-top: 48px;
            }

            .main-content h1 {
                font-size: 28px;
            }

            .main-content p {
                font-size: 14px;
            }
        }

        /* ============================================
           REMOVE YELLOW HOVER / SELECTION HIGHLIGHT
        ============================================ */
        ::selection {
            background: rgba(196, 154, 60, 0.3);
            color: var(--warm-white);
        }

        ::-moz-selection {
            background: rgba(196, 154, 60, 0.3);
            color: var(--warm-white);
        }

        a, a:hover, a:visited, a:active {
            color: inherit;
            text-decoration: none;
            outline: none;
        }

        *:focus {
            outline: none;
        }

        /* ============================================
           REDUCED MOTION — Accessibility
        ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-delay: 0ms !important;
                transition-duration: 0.01ms !important;
            }

            .preloader {
                animation: none;
                opacity: 0;
                pointer-events: none;
            }

            .main-content {
                animation: none;
                opacity: 1;
            }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- ============================================
         PRELOADER
    ============================================ -->
    <div class="preloader" id="preloader" aria-hidden="false" role="status" aria-label="Loading Halleluyah Church International website">

        <!-- Background light rays -->
        <div class="light-rays" aria-hidden="true">
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
            <div class="light-ray"></div>
        </div>

        <!-- Vignette overlay -->
        <div class="vignette" aria-hidden="true"></div>

        <!-- Center glow behind cross -->
        <div class="center-glow" aria-hidden="true"></div>

        <!-- Particles container -->
        <div class="particles-container" id="particles" aria-hidden="true"></div>

        <!-- Cross with glow -->
        <div class="cross-container" aria-hidden="true">
            <div class="cross-glow"></div>
            <div class="cross-stroke cross-vertical"></div>
            <div class="cross-stroke cross-horizontal"></div>
        </div>

        <!-- Typography -->
        <div class="text-container">
            <h1 class="church-name">
                <span class="line-1">Halleluyah Church</span>
                <span class="line-2">International</span>
            </h1>
            <p class="subtitle">Preparing Your Worship Experience</p>
        </div>

        <!-- Progress bar -->
        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <span class="progress-text" id="progress-text">0%</span>
        </div>

        <!-- Exit glow burst -->
        <div class="exit-glow" aria-hidden="true"></div>

    </div>

    <!-- ============================================
         MAIN CONTENT (revealed after preloader)
    ============================================ -->
    <main class="main-content" id="main-content" aria-live="polite">
        <h1>Welcome</h1>
        <p>Halleluyah Church International</p>
    </main>

    <script>
        /* ============================================
           PARTICLE SYSTEM
           Creates floating gold/white particles that
           rise from bottom to top with gentle drift.
        ============================================ */
        (function() {
            const container = document.getElementById('particles');
            const PARTICLE_COUNT = 60;
            const COLORS = ['#FFFFFF', '#F0E6C8', '#DDBA5C', '#C49A3C'];

            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // Random properties
                const size = 2 + Math.random() * 3;
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                const startX = Math.random() * 100;
                const duration = 8 + Math.random() * 10;
                const delay = Math.random() * 12;
                const drift = (Math.random() - 0.5) * 60;

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    left: ${startX}%;
                    bottom: -5%;
                    opacity: 0;
                    animation: particleFloat ${duration}s linear ${delay}s infinite;
                    --particle-drift: ${drift}px;
                `;

                return particle;
            }

            // Create particles
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                container.appendChild(createParticle());
            }

            // Add particle keyframes dynamically
            const style = document.createElement('style');
            style.textContent = `
                @keyframes particleFloat {
                    0% {
                        transform: translateY(0) translateX(0);
                        opacity: 0;
                    }
                    8% {
                        opacity: ${0.3 + Math.random() * 0.5};
                    }
                    80% {
                        opacity: ${0.2 + Math.random() * 0.4};
                    }
                    100% {
                        transform: translateY(-110vh) translateX(var(--particle-drift, 0px));
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        })();

        /* ============================================
           PROGRESS COUNTER
           Updates the percentage text in sync with
           the CSS progress bar animation.
        ============================================ */
        (function() {
            const progressText = document.getElementById('progress-text');
            const startTime = 5000; // matches CSS animation-delay
            const duration = 1800;  // matches CSS animation-duration
            let started = false;

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function updateProgress() {
                const elapsed = performance.now() - startTime;

                if (elapsed < 0) {
                    requestAnimationFrame(updateProgress);
                    return;
                }

                if (!started) {
                    started = true;
                }

                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);
                const percentage = Math.floor(easedProgress * 100);

                progressText.textContent = percentage + '%';

                if (progress < 1) {
                    requestAnimationFrame(updateProgress);
                } else {
                    progressText.textContent = '100%';
                }
            }

            // Start monitoring after a short delay
            setTimeout(() => {
                requestAnimationFrame(updateProgress);
            }, startTime - 100);
        })();

        /* ============================================
           PRELOADER CLEANUP
           Removes the preloader from DOM after
           animation completes to free resources.
        ============================================ */
        (function() {
            const preloader = document.getElementById('preloader');
            const mainContent = document.getElementById('main-content');

            // After all animations complete (~9s), clean up and redirect
            setTimeout(() => {
                preloader.style.display = 'none';
                preloader.setAttribute('aria-hidden', 'true');
                mainContent.setAttribute('aria-live', 'off');
